<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Society Management System</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow:hidden;
position:relative;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 20s linear infinite;
}

.bubble:nth-child(1){
width:140px;
height:140px;
left:10%;
bottom:-100px;
}

.bubble:nth-child(2){
width:220px;
height:220px;
right:10%;
bottom:-150px;
animation-duration:25s;
}

.bubble:nth-child(3){
width:100px;
height:100px;
left:70%;
bottom:-50px;
animation-duration:18s;
}

@keyframes float{
from{
transform:translateY(0) rotate(0deg);
}
to{
transform:translateY(-1200px) rotate(360deg);
}
}

.container{

width:100%;
max-width:500px;

padding:40px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.3);

animation:fadeIn 1s ease;

position:relative;
z-index:10;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
color:white;
font-size:30px;
font-weight:700;
}

.logo span{
color:#c4b5fd;
}

.subtitle{
text-align:center;
color:#e2e8f0;
margin-bottom:25px;
font-size:14px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:8px;
color:white;
font-size:14px;
}

.form-group input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
font-size:14px;
transition:.3s;
}

.form-group input::placeholder{
color:#cbd5e1;
}

.form-group input:focus{
background:rgba(255,255,255,.25);
box-shadow:0 0 15px rgba(255,255,255,.2);
}

.reset-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.reset-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(99,102,241,.5);
}

.error{
background:#ef4444;
padding:12px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
color:white;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#cbd5e1;
}

@media(max-width:600px){

.container{
padding:25px;
}

.logo h1{
font-size:24px;
}

.subtitle{
font-size:13px;
}

.bubble{
display:none;
}

}

</style>

</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<div class="logo">
<h1>Society <span>Management System</span></h1>
</div>

<div class="subtitle">
Create a New Secure Password
</div>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>New Password</label>
<input
type="password"
name="password"
placeholder="Enter new password"
required>
</div>

<div class="form-group">
<label>Confirm Password</label>
<input
type="password"
name="confirm_password"
placeholder="Confirm new password"
required>
</div>

<button type="submit" class="reset-btn">
Reset Password
</button>

</form>

<div class="footer">
© 2026 Society Management System
</div>

</div>

</body>
</html>
