<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Announcements</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
padding:30px;
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:bgAnimation 12s ease infinite;
color:white;
}

@keyframes bgAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.header h1{
font-size:35px;
}

.back-btn{
text-decoration:none;
color:white;
background:#3b82f6;
padding:12px 20px;
border-radius:12px;
transition:.3s;
}

.back-btn:hover{
transform:translateY(-3px);
}

.container{
display:grid;
grid-template-columns:1fr 1.5fr;
gap:25px;
}

.form-card,
.announcement-card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

border-radius:20px;

padding:25px;

animation:fadeIn .8s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.form-card h2,
.announcement-card h2{
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:6px;
}

.form-group input,
.form-group textarea{

width:100%;

padding:12px;

border:none;

outline:none;

border-radius:10px;

background:rgba(255,255,255,.15);

color:white;
}

.form-group textarea{
height:130px;
resize:none;
}

.form-group input::placeholder,
.form-group textarea::placeholder{
color:#d1d5db;
}

.submit-btn{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#10b981;

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;
}

.submit-btn:hover{
transform:translateY(-3px);
}

.announcement-item{

background:rgba(255,255,255,.05);

padding:20px;

border-radius:15px;

margin-bottom:15px;

border-left:4px solid #3b82f6;
}

.announcement-item h3{
margin-bottom:8px;
}

.announcement-item p{
color:#e5e7eb;
line-height:1.6;
margin-bottom:10px;
}

.date{
font-size:13px;
color:#cbd5e1;
}

.delete-btn{

display:inline-block;

margin-top:10px;

padding:8px 14px;

background:#ef4444;

color:white;

text-decoration:none;

border-radius:8px;

font-size:13px;

transition:.3s;
}

.delete-btn:hover{
transform:translateY(-2px);
}

.no-data{
text-align:center;
padding:40px;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

}

@media(max-width:600px){

body{
padding:15px;
}

.header h1{
font-size:28px;
}

}

</style>
</head>
<body>

<div class="header">

<h1>📢 Manage Announcements</h1>

<a href="{% url 'admin_dashboard' %}" class="back-btn">
← Dashboard
</a>

</div>

<div class="container">

<!-- Create Announcement -->

<div class="form-card">

<h2>Create Announcement</h2>

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label>Title</label>
<input
type="text"
name="title"
placeholder="Announcement title"
required>
</div>

<div class="form-group">
<label>Message</label>
<textarea
name="message"
placeholder="Write announcement..."
required></textarea>
</div>

<button class="submit-btn">
Publish Announcement
</button>

</form>

</div>

<!-- View Announcements -->

<div class="announcement-card">

<h2>All Announcements</h2>

{% for announcement in announcements %}

<div class="announcement-item">

<h3>{{ announcement.title }}</h3>

<p>{{ announcement.message }}</p>

<div class="date">
{{ announcement.created_at|date:"d M Y h:i A" }}
</div>

<a
href="{% url 'delete_announcement' announcement.id %}"
class="delete-btn">

Delete

</a>

</div>

{% empty %}

<div class="no-data">

No Announcements Available

</div>

{% endfor %}

</div>

</div>

</body>
</html>
