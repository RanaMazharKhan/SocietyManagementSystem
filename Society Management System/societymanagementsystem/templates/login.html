<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Management System - Login</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:gradientAnimation 12s ease infinite;
overflow:hidden;
position:relative;
}

@keyframes gradientAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
animation:float 18s linear infinite;
}

.bubble:nth-child(1){width:120px;height:120px;left:8%;top:90%;}
.bubble:nth-child(2){width:180px;height:180px;right:8%;top:80%;animation-duration:22s;}
.bubble:nth-child(3){width:90px;height:90px;left:75%;top:95%;}
.bubble:nth-child(4){width:150px;height:150px;left:82%;top:15%;}

@keyframes float{
from{transform:translateY(0) rotate(0deg);}
to{transform:translateY(-1200px) rotate(360deg);}
}

.container{
width:430px;
padding:40px;
border-radius:25px;
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(20px);
box-shadow:0 20px 50px rgba(0,0,0,.35);
animation:fadeIn 1s ease;
position:relative;
z-index:10;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo h1{
color:#fff;
font-size:30px;
font-weight:700;
}

.logo span{
color:#c4b5fd;
}

.subtitle{
text-align:center;
color:#e2e8f0;
margin-bottom:28px;
font-size:14px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
color:white;
margin-bottom:8px;
font-size:14px;
}

.form-group input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,.15);
color:white;
font-size:14px;
transition:.3s;
}

.form-group input::placeholder{
color:#cbd5e1;
}

.form-group input:focus{
background:rgba(255,255,255,.25);
box-shadow:0 0 15px rgba(255,255,255,.25);
transform:translateY(-2px);
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(99,102,241,.5);
}

.register-link{
text-align:center;
margin-top:18px;
color:#e2e8f0;
font-size:14px;
}

.register-link a{
color:white;
text-decoration:none;
font-weight:600;
}

.register-link a:hover{
text-decoration:underline;
}

.footer{
text-align:center;
margin-top:18px;
font-size:12px;
color:#cbd5e1;
}

@media (max-width:768px){
.container{
width:90%;
padding:30px;
}
.logo h1{
font-size:26px;
}
}

@media (max-width:480px){
.container{
width:95%;
padding:25px;
border-radius:18px;
}
.logo h1{
font-size:22px;
}
.subtitle{
font-size:13px;
}
.form-group input,
.login-btn{
padding:12px;
}
}
</style>
</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<div class="logo">
<h1>Society <span>Management System</span></h1>
</div>

<div class="subtitle">
Login to access your resident dashboard
</div>

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" placeholder="Enter your password" required>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div class="register-link">
Don't have an account?
<a href="{% url 'register' %}">Register Now</a>
</div>
 <div class="register-link">
Do You Forgot Your Password?
<a href="{% url 'forget_password' %}">Forget Password </a>
</div>

<div class="footer">
© 2026 Society Management System
</div>

</div>

</body>
</html>
