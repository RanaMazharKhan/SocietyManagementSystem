<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Sent</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:bgMove 12s ease infinite;

overflow:hidden;
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 18s linear infinite;
}

.bubble:nth-child(1){
width:150px;
height:150px;
left:10%;
bottom:-80px;
}

.bubble:nth-child(2){
width:250px;
height:250px;
right:5%;
bottom:-100px;
animation-duration:25s;
}

@keyframes float{
from{
transform:translateY(0) rotate(0deg);
}
to{
transform:translateY(-1200px) rotate(360deg);
}
}

.container{

width:100%;
max-width:550px;

padding:40px;

text-align:center;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 50px rgba(0,0,0,.3);

animation:fadeIn 1s ease;

position:relative;
z-index:10;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.success-icon{
font-size:70px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

h1{
color:white;
margin-bottom:15px;
font-size:30px;
}

p{
color:#e2e8f0;
line-height:1.8;
margin-bottom:30px;
}

.btn{

display:inline-block;

padding:14px 28px;

border-radius:12px;

background:linear-gradient(
135deg,
#6366f1,
#8b5cf6
);

color:white;

text-decoration:none;

font-weight:600;

transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(99,102,241,.4);
}

@media(max-width:600px){

.container{
padding:25px;
}

h1{
font-size:24px;
}

.success-icon{
font-size:55px;
}

.bubble{
display:none;
}

}

</style>
</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<div class="success-icon">
✅
</div>

<h1>Password Reset Request Sent</h1>

<p>
We have received your password reset request.
Kindly check your email for instructions to reset your password. If you don't receive an email within a few minutes, please check your spam folder or try again.
</p>

<a href="{% url 'login' %}" class="btn">
Back to Login
</a>

</div>

</body>
</html>
