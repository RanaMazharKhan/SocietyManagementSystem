<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | Society Management System</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;

background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:bgMove 12s ease infinite;

overflow:hidden;
position:relative;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 18s linear infinite;
}

.bubble:nth-child(1){
width:150px;
height:150px;
left:10%;
bottom:-50px;
}

.bubble:nth-child(2){
width:220px;
height:220px;
right:10%;
bottom:-100px;
animation-duration:25s;
}

@keyframes float{
from{
transform:translateY(0) rotate(0deg);
}
to{
transform:translateY(-1200px) rotate(360deg);
}
}

.container{

width:100%;
max-width:450px;

padding:40px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 50px rgba(0,0,0,.3);

animation:fadeIn 1s ease;

position:relative;
z-index:10;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo h1{
color:white;
font-size:28px;
}

.logo span{
color:#c4b5fd;
}

.subtitle{
text-align:center;
color:#e2e8f0;
margin-bottom:25px;
font-size:14px;
}

.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
color:white;
margin-bottom:8px;
}

.form-group input{

width:100%;

padding:14px;

border:none;
outline:none;

border-radius:12px;

background:rgba(255,255,255,.15);

color:white;
}

.form-group input::placeholder{
color:#cbd5e1;
}

.form-group input:focus{
background:rgba(255,255,255,.25);
box-shadow:0 0 15px rgba(255,255,255,.2);
}

.btn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:linear-gradient(135deg,#6366f1,#8b5cf6);

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(99,102,241,.4);
}

.back-link{
text-align:center;
margin-top:18px;
}

.back-link a{
color:white;
text-decoration:none;
font-weight:600;
}

.back-link a:hover{
text-decoration:underline;
}

.error{
background:#ef4444;
padding:10px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

.success{
background:#10b981;
padding:10px;
border-radius:10px;
margin-bottom:15px;
text-align:center;
}

@media(max-width:480px){

.container{
padding:25px;
}

.logo h1{
font-size:22px;
}

.bubble{
display:none;
}

}

</style>
</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<div class="logo">
<h1>Society <span>Management System</span></h1>
</div>

<div class="subtitle">
Enter your registered email address
</div>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="form-group">
<label name="email", id="id_email">Email Address</label>
<input
type="email"
name="email"

placeholder="Enter registered email"
required id="id_email">
</input>
</div>

<button type="submit" class="btn">
Continue
</button>

</form>

<div class="back-link">
<a href="{% url 'login' %}">
← Back to Login
</a>
</div>

</div>

</body>
</html>
