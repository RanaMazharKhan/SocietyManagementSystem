<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Successful | Society Management System</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow:hidden;
position:relative;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.08);
animation:float 18s linear infinite;
}

.bubble:nth-child(1){
width:140px;
height:140px;
left:10%;
bottom:-100px;
}

.bubble:nth-child(2){
width:220px;
height:220px;
right:10%;
bottom:-150px;
animation-duration:24s;
}

.bubble:nth-child(3){
width:100px;
height:100px;
left:70%;
bottom:-60px;
animation-duration:20s;
}

@keyframes float{
from{
transform:translateY(0) rotate(0deg);
}
to{
transform:translateY(-1200px) rotate(360deg);
}
}

.container{
width:100%;
max-width:550px;
padding:45px;
text-align:center;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.15);
border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

animation:fadeIn 1s ease;

position:relative;
z-index:10;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.success-icon{
font-size:80px;
margin-bottom:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

h1{
color:white;
font-size:32px;
margin-bottom:15px;
}

p{
color:#e2e8f0;
line-height:1.8;
margin-bottom:30px;
font-size:15px;
}

.login-btn{
display:inline-block;
padding:14px 30px;

background:linear-gradient(
135deg,
#6366f1,
#8b5cf6
);

color:white;
text-decoration:none;

font-weight:600;

border-radius:12px;

transition:.3s;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(99,102,241,.5);
}

.footer{
margin-top:25px;
font-size:12px;
color:#cbd5e1;
}

@media(max-width:600px){

.container{
padding:30px;
}

.success-icon{
font-size:60px;
}

h1{
font-size:24px;
}

p{
font-size:14px;
}

.bubble{
display:none;
}

}

</style>

</head>
<body>

<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<div class="container">

<div class="success-icon">
✅
</div>

<h1>Password Reset Successful</h1>

<p>
Your password has been updated successfully.
You can now login to your Society Management System account using your new password.
</p>

<a href="{% url 'login' %}" class="login-btn">
Go To Login
</a>

<div class="footer">
© 2026 Society Management System
</div>

</div>

</body>
</html>
